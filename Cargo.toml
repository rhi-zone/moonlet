[workspace]
resolver = "2"
members = ["crates/spore-core", "crates/spore-lua", "crates/integrations/*"]

[workspace.package]
version = "0.1.0"
edition = "2024"
license = "MIT OR Apache-2.0"
repository = "https://github.com/rhizome-lab/spore"

[workspace.dependencies]
# Internal crates
rhizome-spore-core = { path = "crates/spore-core" }
rhizome-spore-lua = { path = "crates/spore-lua" }
rhizome-spore-moss = { path = "crates/integrations/spore-moss" }
rhizome-spore-lotus = { path = "crates/integrations/spore-lotus" }

# External dependencies
thiserror = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
regex = "1"
tokio = { version = "1", features = ["full"] }
reqwest = { version = "0.12", features = ["rustls-tls", "json"] }
libsql = "0.9"
mlua = { version = "0.10", features = ["luajit", "vendored", "serialize", "send", "async"] }
rig-core = "0.27"
dotenvy = "0.15"
